<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu Planejamento</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F7F6F2; --surface: #FFFFFF; --surface2: #F1EFE8;
      --border: rgba(0,0,0,0.09); --border-strong: rgba(0,0,0,0.16);
      --text: #1A1A18; --text-muted: #6B6B66; --text-faint: #A8A8A3;
      --alta-bg: #FAECE7; --alta-text: #993C1D;
      --media-bg: #FAEEDA; --media-text: #854F0B;
      --baixa-bg: #EAF3DE; --baixa-text: #3B6D11;
      --meet-dot: #378ADD; --radius: 10px; --radius-sm: 6px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #181816; --surface: #222220; --surface2: #2C2C2A;
        --border: rgba(255,255,255,0.09); --border-strong: rgba(255,255,255,0.18);
        --text: #EEEEE8; --text-muted: #9A9A94; --text-faint: #5A5A56;
        --alta-bg: #4A1B0C; --alta-text: #F0997B;
        --media-bg: #412402; --media-text: #FAC775;
        --baixa-bg: #173404; --baixa-text: #97C459;
        --meet-dot: #85B7EB;
      }
    }

    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
    .page { max-width: 680px; margin: 0 auto; }

    header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2rem; gap: 1rem; }
    header h1 { font-size: 22px; font-weight: 500; letter-spacing: -0.02em; }
    header p { font-size: 13px; color: var(--text-muted); margin-top: 3px; text-transform: capitalize; }

    .sync-badge { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-faint); padding: 6px 10px; border: 0.5px solid var(--border); border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
    .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-faint); flex-shrink: 0; transition: background .3s; }
    .sync-dot.online  { background: #3B6D11; }
    .sync-dot.syncing { background: #854F0B; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .summary { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 2rem; }
    .metric { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem; }
    .metric-label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; letter-spacing: .04em; text-transform: uppercase; }
    .metric-val { font-size: 28px; font-weight: 500; font-family: 'DM Mono', monospace; }

    .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
    .tab { padding: 9px 18px; font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; border: none; background: none; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .15s; }
    .tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
    .tab:hover:not(.active) { color: var(--text); }
    .panel { display: none; } .panel.active { display: block; }

    .add-row { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }

    input[type="text"], input[type="datetime-local"], select, textarea {
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      background: var(--surface); border: 0.5px solid var(--border-strong);
      border-radius: var(--radius-sm); color: var(--text); padding: 8px 12px;
      outline: none; transition: border-color .15s;
    }
    input[type="text"]:focus, input[type="datetime-local"]:focus, select:focus, textarea:focus { border-color: var(--text-muted); }
    input[type="text"] { flex: 1; min-width: 0; }
    textarea { width: 100%; resize: vertical; min-height: 80px; line-height: 1.5; }

    button { font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 8px 16px; border-radius: var(--radius-sm); border: 0.5px solid var(--border-strong); background: var(--surface); color: var(--text); cursor: pointer; transition: background .15s, transform .1s; white-space: nowrap; }
    button:hover { background: var(--surface2); }
    button:active { transform: scale(0.98); }
    button.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
    button.primary:hover { opacity: .85; }

    .section-title { font-size: 10px; font-weight: 500; color: var(--text-faint); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .75rem; }

    .item { display: flex; align-items: flex-start; gap: 10px; padding: 11px 0; border-bottom: 0.5px solid var(--border); }
    .item:last-child { border-bottom: none; }
    .item input[type="checkbox"] { width: 16px; height: 16px; margin-top: 1px; cursor: pointer; flex-shrink: 0; accent-color: var(--text); }
    .item-content { flex: 1; min-width: 0; }
    .item-text { font-size: 14px; color: var(--text); line-height: 1.4; }
    .item-text.done { text-decoration: line-through; color: var(--text-faint); }
    .badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 500; margin-top: 4px; }
    .badge-alta  { background: var(--alta-bg);  color: var(--alta-text);  }
    .badge-media { background: var(--media-bg); color: var(--media-text); }
    .badge-baixa { background: var(--baixa-bg); color: var(--baixa-text); }
    .del { background: none; border: none; color: var(--text-faint); cursor: pointer; font-size: 18px; line-height: 1; padding: 0 2px; flex-shrink: 0; transition: color .15s; }
    .del:hover { color: #E24B4A; transform: none; }

    .meeting-item { display: flex; align-items: flex-start; gap: 12px; padding: 11px 0; border-bottom: 0.5px solid var(--border); }
    .meeting-item:last-child { border-bottom: none; }
    .meeting-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--meet-dot); flex-shrink: 0; margin-top: 5px; }
    .meeting-info { flex: 1; }
    .meeting-title { font-size: 14px; color: var(--text); font-weight: 500; }
    .meeting-time { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .note-card { background: var(--surface2); border-radius: var(--radius); padding: 1rem; margin-bottom: .75rem; display: flex; gap: 10px; align-items: flex-start; }
    .note-body { flex: 1; min-width: 0; }
    .note-text { font-size: 13px; color: var(--text); line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .note-date { font-size: 11px; color: var(--text-faint); margin-top: 6px; font-family: 'DM Mono', monospace; }

    .empty   { font-size: 13px; color: var(--text-faint); padding: 2.5rem 0; text-align: center; }
    .loading { font-size: 13px; color: var(--text-faint); padding: 2rem 0; text-align: center; }
  </style>
</head>
<body>
<div class="page">

  <header>
    <div>
      <h1>Meu planejamento</h1>
      <p id="today-date"></p>
    </div>
    <div class="sync-badge">
      <div class="sync-dot syncing" id="sync-dot"></div>
      <span id="sync-label">Conectando...</span>
    </div>
  </header>

  <div class="summary">
    <div class="metric"><div class="metric-label">Pendentes</div><div class="metric-val" id="m-pending">—</div></div>
    <div class="metric"><div class="metric-label">Reuniões hoje</div><div class="metric-val" id="m-meetings">—</div></div>
    <div class="metric"><div class="metric-label">Concluídas</div><div class="metric-val" id="m-done">—</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('tasks',this)">Tarefas</button>
    <button class="tab" onclick="switchTab('meetings',this)">Reuniões</button>
    <button class="tab" onclick="switchTab('notes',this)">Notas</button>
  </div>

  <div class="panel active" id="panel-tasks">
    <div class="add-row">
      <input type="text" id="task-input" placeholder="Nova tarefa..." />
      <select id="task-prio">
        <option value="alta">Alta</option>
        <option value="media" selected>Média</option>
        <option value="baixa">Baixa</option>
      </select>
      <button class="primary" onclick="addTask()">+ Adicionar</button>
    </div>
    <div class="section-title">Lista de tarefas</div>
    <div id="task-list"><div class="loading">Carregando...</div></div>
  </div>

  <div class="panel" id="panel-meetings">
    <div class="add-row">
      <input type="text" id="meet-input" placeholder="Título da reunião..." style="flex:2;min-width:140px" />
      <input type="datetime-local" id="meet-time" style="flex:1;min-width:160px" />
      <button class="primary" onclick="addMeeting()">+ Adicionar</button>
    </div>
    <div class="section-title">Agenda de reuniões</div>
    <div id="meeting-list"><div class="loading">Carregando...</div></div>
  </div>

  <div class="panel" id="panel-notes">
    <div style="margin-bottom:1.25rem">
      <textarea id="note-input" placeholder="Escreva uma anotação..."></textarea>
      <div style="display:flex;justify-content:flex-end;margin-top:8px">
        <button class="primary" onclick="addNote()">+ Salvar nota</button>
      </div>
    </div>
    <div class="section-title">Anotações</div>
    <div id="note-list"><div class="loading">Carregando...</div></div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import {
    getFirestore, collection, addDoc, deleteDoc, updateDoc,
    doc, onSnapshot, query, orderBy, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyDb27NIDTls1054WSaiRdN8aq5JHvNoDy8",
    authDomain: "my-plan-7ab94.firebaseapp.com",
    projectId: "my-plan-7ab94",
    storageBucket: "my-plan-7ab94.firebasestorage.app",
    messagingSenderId: "1015795258471",
    appId: "1:1015795258471:web:1c2576beeaa1a7fa9530c2"
  });

  const db = getFirestore(app);

  let tasks = [], meetings = [], notes = [];

  function setSync(state) {
    const dot = document.getElementById('sync-dot');
    const lbl = document.getElementById('sync-label');
    dot.className = 'sync-dot ' + state;
    lbl.textContent = { online: 'Sincronizado', syncing: 'Sincronizando...', connecting: 'Conectando...' }[state] || '';
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

  // --- Tab ---
  window.switchTab = (name, el) => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('panel-' + name).classList.add('active');
  };

  // --- Tasks ---
  const tasksCol = collection(db, 'tasks');

  window.addTask = async () => {
    const v = document.getElementById('task-input').value.trim();
    if (!v) return;
    setSync('syncing');
    await addDoc(tasksCol, { text: v, prio: document.getElementById('task-prio').value, done: false, createdAt: serverTimestamp() });
    document.getElementById('task-input').value = '';
  };

  window.toggleTask = async (id, done) => {
    setSync('syncing');
    await updateDoc(doc(db, 'tasks', id), { done: !done });
  };

  window.delTask = async id => {
    setSync('syncing');
    await deleteDoc(doc(db, 'tasks', id));
  };

  onSnapshot(query(tasksCol, orderBy('createdAt', 'asc')), snap => {
    tasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderTasks(); renderSummary(); setSync('online');
  });

  function renderTasks() {
    const el = document.getElementById('task-list');
    if (!tasks.length) { el.innerHTML = '<div class="empty">Nenhuma tarefa ainda</div>'; return; }
    const sorted = [...tasks].sort((a,b) => {
      const p = { alta:0, media:1, baixa:2 };
      if (a.done !== b.done) return a.done ? 1 : -1;
      return p[a.prio] - p[b.prio];
    });
    el.innerHTML = sorted.map(t => `
      <div class="item">
        <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask('${t.id}',${t.done})" />
        <div class="item-content">
          <div class="item-text ${t.done?'done':''}">${esc(t.text)}</div>
          <span class="badge badge-${t.prio}">${cap(t.prio)}</span>
        </div>
        <button class="del" onclick="delTask('${t.id}')" title="Remover">×</button>
      </div>`).join('');
  }

  // --- Meetings ---
  const meetCol = collection(db, 'meetings');

  window.addMeeting = async () => {
    const t = document.getElementById('meet-input').value.trim();
    const d = document.getElementById('meet-time').value;
    if (!t) return;
    setSync('syncing');
    await addDoc(meetCol, { title: t, time: d, createdAt: serverTimestamp() });
    document.getElementById('meet-input').value = '';
    document.getElementById('meet-time').value = '';
  };

  window.delMeeting = async id => {
    setSync('syncing');
    await deleteDoc(doc(db, 'meetings', id));
  };

  onSnapshot(query(meetCol, orderBy('createdAt', 'asc')), snap => {
    meetings = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderMeetings(); renderSummary(); setSync('online');
  });

  function renderMeetings() {
    const el = document.getElementById('meeting-list');
    if (!meetings.length) { el.innerHTML = '<div class="empty">Nenhuma reunião agendada</div>'; return; }
    const sorted = [...meetings].sort((a,b) => new Date(a.time||0) - new Date(b.time||0));
    el.innerHTML = sorted.map(m => `
      <div class="meeting-item">
        <div class="meeting-dot"></div>
        <div class="meeting-info">
          <div class="meeting-title">${esc(m.title)}</div>
          <div class="meeting-time">${m.time ? new Date(m.time).toLocaleString('pt-BR',{weekday:'short',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : 'Sem data definida'}</div>
        </div>
        <button class="del" onclick="delMeeting('${m.id}')" title="Remover">×</button>
      </div>`).join('');
  }

  // --- Notes ---
  const notesCol = collection(db, 'notes');

  window.addNote = async () => {
    const v = document.getElementById('note-input').value.trim();
    if (!v) return;
    setSync('syncing');
    await addDoc(notesCol, { text: v, date: new Date().toLocaleString('pt-BR'), createdAt: serverTimestamp() });
    document.getElementById('note-input').value = '';
  };

  window.delNote = async id => {
    setSync('syncing');
    await deleteDoc(doc(db, 'notes', id));
  };

  onSnapshot(query(notesCol, orderBy('createdAt', 'desc')), snap => {
    notes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderNotes(); setSync('online');
  });

  function renderNotes() {
    const el = document.getElementById('note-list');
    el.innerHTML = notes.length
      ? notes.map(n => `
          <div class="note-card">
            <div class="note-body">
              <div class="note-text">${esc(n.text)}</div>
              <div class="note-date">${n.date}</div>
            </div>
            <button class="del" onclick="delNote('${n.id}')" title="Remover">×</button>
          </div>`).join('')
      : '<div class="empty">Nenhuma anotação ainda</div>';
  }

  // --- Summary ---
  function renderSummary() {
    const today = new Date().toDateString();
    document.getElementById('m-pending').textContent  = tasks.filter(t => !t.done).length;
    document.getElementById('m-done').textContent     = tasks.filter(t =>  t.done).length;
    document.getElementById('m-meetings').textContent = meetings.filter(m => m.time && new Date(m.time).toDateString() === today).length;
  }

  // --- Init ---
  document.getElementById('today-date').textContent = new Date().toLocaleDateString('pt-BR', {
    weekday:'long', day:'numeric', month:'long', year:'numeric'
  });
  document.getElementById('task-input').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
</script>
</body>
</html>
